<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Xác nhận đã thu tiền mặt</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>
<div class="container mt-4">

    <a th:href="@{/owner/invoices}" class="btn btn-secondary mb-3">Quay lại</a>

    <div class="card shadow-sm">
        <div class="card-header bg-success text-white">
            <h3>Xác nhận đã thu tiền mặt</h3>
        </div>

        <div class="card-body">

            <div class="alert alert-info">
                Chức năng này dùng khi người thuê đã thanh toán trực tiếp bằng tiền mặt
                hoặc chủ trọ đã nhận đủ tiền bên ngoài hệ thống.
            </div>

            <table class="table table-bordered">
                <tr>
                    <th>Mã hóa đơn</th>
                    <td th:text="${invoice.invoiceCode}"></td>
                </tr>

                <tr>
                    <th>Phòng</th>
                    <td th:text="${invoice.room != null ? invoice.room.roomNumber : 'Không có'}"></td>
                </tr>

                <tr>
                    <th>Người thuê</th>
                    <td th:text="${invoice.tenant != null ? invoice.tenant.fullName : 'Không có'}"></td>
                </tr>

                <tr>
                    <th>Tổng tiền</th>
                    <td>
                        <span th:text="${#numbers.formatDecimal(invoice.totalAmount, 0, 'COMMA', 0, 'POINT')}"></span>
                        VNĐ
                    </td>
                </tr>

                <tr>
                    <th>Đã thanh toán</th>
                    <td>
                        <span th:text="${#numbers.formatDecimal(invoice.paidAmount, 0, 'COMMA', 0, 'POINT')}"></span>
                        VNĐ
                    </td>
                </tr>

                <tr>
                    <th>Còn lại</th>
                    <td>
                        <strong>
                            <span th:text="${#numbers.formatDecimal(invoice.remainingAmount, 0, 'COMMA', 0, 'POINT')}"></span>
                            VNĐ
                        </strong>
                    </td>
                </tr>
            </table>

            <form th:action="@{/owner/invoices/{id}/mark-paid(id=${invoice.id})}" method="post">
                <button type="submit" class="btn btn-success">
                    Xác nhận đã thu đủ tiền
                </button>

                <a th:href="@{/owner/invoices/{id}(id=${invoice.id})}" class="btn btn-secondary">
                    Hủy
                </a>
            </form>

        </div>
    </div>

</div>
</body>
</html>
