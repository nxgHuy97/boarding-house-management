<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Thêm Hợp Đồng</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
</head>
<body>

<div class="container py-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2><i class="bi bi-file-earmark-plus text-primary"></i> Tạo Hợp Đồng Mới</h2>
        <a th:href="@{/owner/contracts}" class="btn btn-secondary">Quay lại</a>
    </div>

    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

    <div class="card shadow-sm border-0">
        <div class="card-body">
            <form th:action="@{/owner/contracts/save}" th:object="${contract}" method="POST">

                <div class="mb-3">
                    <label class="form-label fw-bold">Chọn Phòng</label>
                    <select class="form-select" th:field="*{room.id}" required>
                        <option value="" disabled selected>-- Chọn phòng --</option>
                        <option th:each="room : ${rooms}"
                                th:value="${room.id}"
                                th:text="'Phòng ' + ${room.roomNumber} + ' (Mã dãy: ' + ${room.roomCode} + ')'">
                        </option>
                    </select>
                </div>

                <div class="mb-3">
                    <label class="form-label fw-bold">Chọn Người Thuê</label>
                    <select class="form-select" th:field="*{tenant.id}" required>
                        <option value="" disabled selected>-- Chọn người thuê --</option>
                        <option th:each="tenant : ${tenants}"
                                th:value="${tenant.id}"
                                th:text="${tenant.fullName} + ' - SĐT: ' + ${tenant.phone}">
                        </option>
                    </select>
                </div>

                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label fw-bold">Giá thuê (VNĐ)</label>
                        <input type="number" class="form-control" th:field="*{price}" placeholder="3000000" required>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label fw-bold">Tiền cọc (VNĐ)</label>
                        <input type="number" class="form-control" th:field="*{deposit}" placeholder="1000000" required>
                    </div>
                </div>

                <div class="mb-3">
                    <label class="form-label fw-bold">Ngày bắt đầu</label>
                    <input type="date" class="form-control" th:field="*{startDate}" required>
                </div>

                <div class="text-end">
                    <button type="submit" class="btn btn-success"><i class="bi bi-save"></i> Lưu hợp đồng</button>
                </div>
            </form>
        </div>
    </div>
</div>

</body>
</html>
