<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Quản lý hợp đồng - Owner Panel</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        body { background-color: #f8f9fa; }
        .card { border-radius: 15px; border: none; }
        .table th { vertical-align: middle; }
        .table td { vertical-align: middle; }
    </style>
</head>
<body>

<div class="container py-5">
    <div th:if="${message}" class="alert alert-success alert-dismissible fade show shadow-sm" role="alert">
        <i class="bi bi-check-circle-fill me-2"></i><span th:text="${message}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>
    <div th:if="${error}" class="alert alert-danger alert-dismissible fade show shadow-sm" role="alert">
        <i class="bi bi-exclamation-triangle-fill me-2"></i><span th:text="${error}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2><i class="bi bi-file-earmark-text-fill text-primary"></i> Quản lý Hợp đồng</h2>
        <div>
            <a th:href="@{/owner/contracts/add}" class="btn btn-success shadow-sm me-2">
                <i class="bi bi-plus-lg"></i> Thêm hợp đồng
            </a>
            <a th:href="@{/owner/dashboard}" class="btn btn-outline-secondary shadow-sm">
                <i class="bi bi-arrow-left"></i> Về Dashboard
            </a>
        </div>
    </div>

    <div class="card shadow-sm">
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover mb-0 align-middle">
                    <thead class="table-dark">
                    <tr>
                        <th class="ps-4">Mã hợp đồng</th>
                        <th>Phòng</th>
                        <th>Người thuê</th>
                        <th>Ngày bắt đầu</th>
                        <th>Ngày kết thúc</th>
                        <th>Giá thuê (VNĐ)</th>
                        <th>Tiền cọc</th>
                        <th>Trạng thái</th>
                        <th class="text-center">Thao tác</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="contract : ${contracts}">
                        <td class="ps-4 fw-bold" th:text="${contract.contractNumber}"></td>
                        <td th:text="${contract.room != null ? contract.room.roomNumber : 'N/A'}"></td>
                        <td th:text="${contract.tenant != null ? contract.tenant.fullName : 'N/A'}"></td>
                        <td th:text="${contract.startDate}"></td>
                        <td th:text="${contract.endDate}"></td>
                        <td class="text-danger fw-semibold" th:text="${contract.price}"></td>
                        <td th:text="${contract.deposit}"></td>
                        <td>
                            <span th:if="${contract.status == 'ACTIVE'}" class="badge bg-success">Đang hiệu lực</span>
                            <span th:if="${contract.status != 'ACTIVE'}" class="badge bg-secondary">Kết thúc</span>
                        </td>
                        <td class="text-center">
                            <a th:href="@{/owner/contracts/delete/{id}(id=${contract.id})}"
                               class="btn btn-sm btn-outline-danger"
                               onclick="return confirm('Bạn có chắc chắn muốn xóa hợp đồng này không?');"
                               title="Xóa hợp đồng">
                                <i class="bi bi-trash"></i>
                            </a>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(contracts)}">
                        <td colspan="9" class="text-center py-4 text-muted">Chưa có hợp đồng nào được tạo.</td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
