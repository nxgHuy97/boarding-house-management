<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Chỉnh sửa thông tin phòng</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
  <style>
    body {
        background-color: #f8f9fa;
    }
  </style>
</head>
<body class="py-5">

<div class="container" style="max-width: 600px;">
  <div class="card border-0 shadow-sm">
    <div class="card-body p-4">
      <h4 class="fw-bold mb-4">Cập nhật thông tin phòng</h4>

      <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

      <form th:action="@{/owner/rooms/update/{id}(id=${room.id})}" th:object="${room}" method="POST">

        <div class="mb-3">
          <label class="form-label">Số phòng</label>
          <input type="text" class="form-control" th:field="*{roomNumber}" required placeholder="Nhập số phòng">
        </div>

        <div class="mb-3">
          <label class="form-label">Loại phòng</label>
          <select class="form-select" th:field="*{category.id}" required>
            <option value="" disabled selected>Chọn loại phòng</option>
            <option th:each="cat : ${categories}" th:value="${cat.id}" th:text="${cat.name}"></option>
          </select>
        </div>

        <div class="mb-3">
          <label class="form-label">Giá thuê (VNĐ)</label>
          <input type="number" class="form-control" th:field="*{price}" required placeholder="Nhập giá phòng">
        </div>

        <div class="mb-3">
          <label class="form-label">Trạng thái phòng</label>
          <select class="form-select" th:field="*{status}" required>
            <option value="AVAILABLE">Còn trống</option>
            <option value="RENTED">Đã thuê</option>
          </select>
        </div>

        <div class="d-flex justify-content-between mt-4">
          <a th:href="@{/owner/rooms}" class="btn btn-secondary">Hủy</a>
          <button type="submit" class="btn btn-success"><i class="bi bi-save"></i> Cập nhật</button>
        </div>
      </form>
    </div>
  </div>
</div>

</body>
</html>
