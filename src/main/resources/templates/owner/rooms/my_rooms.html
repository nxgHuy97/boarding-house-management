<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Danh sách phòng</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
</head>
<body class="bg-light">

<div class="container py-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>Quản lý phòng trọ</h2>
        <div>
            <a th:href="@{/owner/rooms/add}" class="btn btn-success"><i class="bi bi-plus-circle"></i> Thêm phòng mới</a>
            <a th:href="@{/owner/dashboard}" class="btn btn-secondary"><i class="bi bi-arrow-left"></i> Về Dashboard</a>
        </div>
    </div>

    <div th:if="${message}" class="alert alert-success" th:text="${message}"></div>
    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

    <div class="card shadow-sm border-0">
        <div class="card-body p-0">
            <table class="table table-hover align-middle mb-0">
                <thead class="table-dark">
                <tr>
                    <th>Số phòng</th>
                    <th>Mã phòng / Dãy trọ</th>
                    <th>Loại phòng</th>
                    <th>Giá (VNĐ)</th>
                    <th>Trạng thái</th>
                    <th>Thao tác</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="room : ${rooms}">
                    <td th:text="${room.roomNumber}">G01</td>
                    <td>
                        <span th:text="${room.roomCode != null ? room.roomCode : 'Chưa có'}" class="badge bg-secondary"></span>
                    </td>
                    <td th:text="${room.category != null ? room.category.name : 'N/A'}">001</td>
                    <td class="text-danger fw-bold" th:text="${#numbers.formatDecimal(room.price, 0, 'COMMA', 0, 'POINT')}">2,500,000</td>
                    <td>
                        <span class="badge bg-success" th:text="${room.status}">Còn trống</span>
                    </td>
                    <td>
                        <a th:href="@{/owner/rooms/edit-code/{id}(id=${room.id})}" class="btn btn-sm btn-warning">
                            <i class="bi bi-key"></i> Cập nhật mã
                        </a>
                        <a th:href="@{/owner/rooms/edit/{id}(id=${room.id})}" class="btn btn-sm btn-primary">
                            <i class="bi bi-pencil-square"></i> Sửa
                        </a>
                        <a th:href="@{/owner/rooms/delete/{id}(id=${room.id})}" class="btn btn-sm btn-danger" onclick="return confirm('Bạn có chắc chắn muốn xóa không?')">
                            <i class="bi bi-trash"></i> Xóa
                        </a>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

</body>
</html>
