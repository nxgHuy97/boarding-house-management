<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Danh sách chờ duyệt - Chủ trọ</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
</head>
<body class="bg-light py-5">
<div class="container">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2><i class="bi bi-hourglass-split text-warning"></i> Yêu cầu phê duyệt phòng trọ</h2>
        <a th:href="@{/owner/dashboard}" class="btn btn-outline-secondary">
            <i class="bi bi-arrow-left"></i> Về Dashboard
        </a>
    </div>

    <div th:if="${message}" class="alert alert-success" th:text="${message}"></div>
    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

    <div class="card shadow-sm border-0">
        <div class="card-body p-0">
            <table class="table table-hover mb-0 align-middle">
                <thead class="table-dark">
                <tr>
                    <th class="ps-4">Họ và tên</th>
                    <th>Tài khoản (SĐT)</th>
                    <th>Email</th>
                    <th class="text-center">Thao tác</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="user : ${pendingUsers}">
                    <td class="ps-4 fw-bold" th:text="${user.fullName}"></td>
                    <td th:text="${user.username}"></td>
                    <td th:text="${user.email}"></td>
                    <td class="text-center">
                        <a th:href="@{/owner/tenants/approve/{id}(id=${user.id})}" class="btn btn-sm btn-success">
                            <i class="bi bi-check-circle"></i> Phê duyệt
                        </a>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(pendingUsers)}">
                    <td colspan="4" class="text-center py-4 text-muted">Không có yêu cầu chờ duyệt nào!</td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
</body>
</html>
