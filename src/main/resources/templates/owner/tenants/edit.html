<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Gán Phòng Cho Người Thuê</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
</head>
<body>

<div class="container py-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2><i class="bi bi-door-open-fill text-primary"></i> Gán / Chuyển Phòng Thuê</h2>
        <a th:href="@{/owner/tenants}" class="btn btn-secondary">Quay lại</a>
    </div>

    <div class="card shadow-sm border-0">
        <div class="card-body">
            <form th:action="@{/owner/tenants/update-room/{id}(id=${tenant.id})}" method="POST">

                <div class="mb-3">
                    <label class="form-label fw-bold">Khách thuê</label>
                    <input type="text" class="form-control" th:value="${tenant.fullName}" readonly disabled>
                </div>

                <div class="mb-3">
                    <label class="form-label fw-bold">Chọn Phòng</label>
                    <select class="form-select" name="roomId" required>
                        <option value="" disabled selected>-- Chọn phòng cho khách --</option>
                        <option th:each="room : ${rooms}"
                                th:value="${room.id}"
                                th:text="'Phòng ' + ${room.roomNumber} + ' - Trạng thái: ' + ${room.status}"
                                th:selected="${tenant.room != null and tenant.room.id == room.id}">
                        </option>
                    </select>
                </div>

                <div class="text-end">
                    <button type="submit" class="btn btn-success">
                        <i class="bi bi-save"></i> Cập nhật phòng
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>

</body>
</html>
