<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Thêm người thuê chi tiết</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        body { background-color: #f8f9fa; }
        .card { border-radius: 15px; }
    </style>
</head>
<body>

<div class="container py-5" style="max-width: 700px;">

    <div th:if="${error}" class="alert alert-danger alert-dismissible fade show shadow-sm" role="alert">
        <i class="bi bi-exclamation-triangle-fill me-2"></i><span th:text="${error}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>

    <div class="card shadow-sm border-0">
        <div class="card-header bg-success text-white py-3 text-center">
            <h4 class="mb-0"><i class="bi bi-person-plus"></i> Thêm Người Thuê Mới</h4>
        </div>
        <div class="card-body p-4">
            <form th:action="@{/owner/tenants/save}" th:object="${tenant}" method="post">

                <div class="mb-3">
                    <label class="form-label fw-bold">Họ và tên:</label>
                    <input type="text" th:field="*{fullName}" class="form-control" placeholder="Nguyễn Văn A" required>
                </div>

                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label fw-bold">Số điện thoại:</label>
                        <input type="text" th:field="*{phone}" class="form-control" placeholder="0912345678" required>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label fw-bold">Email:</label>
                        <input type="email" th:field="*{email}" class="form-control" placeholder="example@gmail.com">
                    </div>
                </div>

                <div class="mb-3">
                    <label class="form-label fw-bold">Mã dãy trọ / Mã phòng:</label>
                    <input type="text" th:field="*{motelCode}" class="form-control" placeholder="Mã dãy trọ hoặc mã phòng" required>
                </div>

                <div class="mb-3">
                    <label class="form-label fw-bold">Phòng trọ:</label>
                    <select class="form-select" th:field="*{room.id}">
                        <option value="" selected>-- Không bắt buộc (Chọn phòng sau) --</option>
                        <option th:each="r : ${rooms}" th:value="${r.id}" th:text="'Phòng ' + ${r.roomNumber}"></option>
                    </select>
                </div>

                <div class="d-grid gap-2 mt-4">
                    <button type="submit" class="btn btn-success btn-lg">Lưu thông tin</button>
                    <a th:href="@{/owner/tenants}" class="btn btn-outline-secondary">Hủy bỏ</a>
                </div>
            </form>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
