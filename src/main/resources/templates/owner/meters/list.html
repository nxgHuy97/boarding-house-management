<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Quản lý điện nước</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>
<div class="container mt-4">

    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2>Quản lý chỉ số điện nước</h2>

        <div>
            <a th:href="@{/owner/dashboard}" class="btn btn-secondary">Dashboard</a>
            <a th:href="@{/owner/meters/add}" class="btn btn-primary">Nhập chỉ số</a>
        </div>
    </div>

    <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

    <table class="table table-bordered table-hover" th:if="${meters != null and !meters.isEmpty()}">
        <thead class="table-dark">
        <tr>
            <th>Phòng</th>
            <th>Tháng/Năm</th>
            <th>Điện cũ</th>
            <th>Điện mới</th>
            <th>Số điện</th>
            <th>Tiền điện</th>
            <th>Nước cũ</th>
            <th>Nước mới</th>
            <th>Số nước</th>
            <th>Tiền nước</th>
            <th>Thao tác</th>
        </tr>
        </thead>

        <tbody>
        <tr th:each="meter : ${meters}">
            <td th:text="${meter.room != null ? meter.room.roomNumber : 'Không có'}"></td>

            <td>
                <span th:text="${meter.month}"></span>/<span th:text="${meter.year}"></span>
            </td>

            <td th:text="${meter.oldElectricity}"></td>
            <td th:text="${meter.newElectricity}"></td>
            <td th:text="${meter.electricityUsed}"></td>

            <td>
                <span th:text="${#numbers.formatDecimal(meter.electricityAmount, 0, 'COMMA', 0, 'POINT')}"></span>
                VNĐ
            </td>

            <td th:text="${meter.oldWater}"></td>
            <td th:text="${meter.newWater}"></td>
            <td th:text="${meter.waterUsed}"></td>

            <td>
                <span th:text="${#numbers.formatDecimal(meter.waterAmount, 0, 'COMMA', 0, 'POINT')}"></span>
                VNĐ
            </td>

            <td>
                <a th:href="@{/owner/meters/{id}/history(id=${meter.id})}" class="btn btn-sm btn-info">
                    Chi tiết
                </a>

                <a th:href="@{/owner/meters/{id}/edit(id=${meter.id})}" class="btn btn-sm btn-warning">
                    Sửa
                </a>
            </td>
        </tr>
        </tbody>
    </table>

    <div th:if="${meters == null or meters.isEmpty()}" class="alert alert-warning">
        Chưa có chỉ số điện nước nào.
    </div>

</div>
</body>
</html>
