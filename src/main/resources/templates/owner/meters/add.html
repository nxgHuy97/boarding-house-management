<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Thêm chỉ số điện nước</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>
<div class="container mt-4">

    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2>Thêm chỉ số điện nước</h2>
        <a th:href="@{/owner/meters}" class="btn btn-secondary">Quay lại</a>
    </div>

    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

    <form th:action="@{/owner/meters/add}" method="post" class="card shadow-sm">
        <div class="card-body">

            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label">Phòng</label>
                    <select name="roomId" class="form-select" required>
                        <option value="">-- Chọn phòng --</option>
                        <option th:each="room : ${rooms}"
                                th:value="${room.id}"
                                th:text="${room.roomNumber}">
                        </option>
                    </select>
                </div>

                <div class="col-md-3 mb-3">
                    <label class="form-label">Tháng</label>
                    <input type="number" name="month" class="form-control" min="1" max="12" required>
                </div>

                <div class="col-md-3 mb-3">
                    <label class="form-label">Năm</label>
                    <input type="number" name="year" class="form-control" min="2020" required>
                </div>
            </div>

            <hr>

            <h5>Chỉ số điện</h5>

            <div class="row">
                <div class="col-md-4 mb-3">
                    <label class="form-label">Chỉ số điện cũ</label>
                    <input type="number" name="oldElectricity" class="form-control" min="0" step="0.1" required>
                </div>

                <div class="col-md-4 mb-3">
                    <label class="form-label">Chỉ số điện mới</label>
                    <input type="number" name="newElectricity" class="form-control" min="0" step="0.1" required>
                </div>

                <div class="col-md-4 mb-3">
                    <label class="form-label">Đơn giá điện</label>
                    <input type="number" name="electricityUnitPrice" class="form-control" min="0" step="100" required>
                </div>
            </div>

            <h5>Chỉ số nước</h5>

            <div class="row">
                <div class="col-md-4 mb-3">
                    <label class="form-label">Chỉ số nước cũ</label>
                    <input type="number" name="oldWater" class="form-control" min="0" step="0.1" required>
                </div>

                <div class="col-md-4 mb-3">
                    <label class="form-label">Chỉ số nước mới</label>
                    <input type="number" name="newWater" class="form-control" min="0" step="0.1" required>
                </div>

                <div class="col-md-4 mb-3">
                    <label class="form-label">Đơn giá nước</label>
                    <input type="number" name="waterUnitPrice" class="form-control" min="0" step="100" required>
                </div>
            </div>

            <div class="mb-3">
                <label class="form-label">Ghi chú</label>
                <textarea name="note" class="form-control" rows="3"></textarea>
            </div>

            <button type="submit" class="btn btn-primary">Lưu chỉ số</button>
        </div>
    </form>

</div>
</body>
</html>
