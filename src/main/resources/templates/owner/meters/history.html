<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Chi tiết chỉ số điện nước</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>
<div class="container mt-4">

    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2>Chi tiết chỉ số điện nước</h2>
        <a th:href="@{/owner/meters}" class="btn btn-secondary">Quay lại</a>
    </div>

    <div class="card shadow-sm">
        <div class="card-header">
            <strong>Phòng:</strong>
            <span th:text="${meter.room != null ? meter.room.roomNumber : 'Không có'}"></span>
            -
            <strong>Tháng:</strong>
            <span th:text="${meter.month}"></span>/<span th:text="${meter.year}"></span>
        </div>

        <div class="card-body">

            <div class="row">
                <div class="col-md-6">
                    <h5>Điện</h5>

                    <table class="table table-bordered">
                        <tr>
                            <th>Chỉ số cũ</th>
                            <td th:text="${meter.oldElectricity}"></td>
                        </tr>

                        <tr>
                            <th>Chỉ số mới</th>
                            <td th:text="${meter.newElectricity}"></td>
                        </tr>

                        <tr>
                            <th>Số điện đã dùng</th>
                            <td th:text="${meter.electricityUsed}"></td>
                        </tr>

                        <tr>
                            <th>Đơn giá điện</th>
                            <td>
                                <span th:text="${#numbers.formatDecimal(meter.electricityUnitPrice, 0, 'COMMA', 0, 'POINT')}"></span> VNĐ
                            </td>
                        </tr>

                        <tr class="table-warning">
                            <th>Thành tiền điện</th>
                            <td>
                                <strong>
                                    <span th:text="${#numbers.formatDecimal(meter.electricityAmount, 0, 'COMMA', 0, 'POINT')}"></span> VNĐ
                                </strong>
                            </td>
                        </tr>
                    </table>
                </div>

                <div class="col-md-6">
                    <h5>Nước</h5>

                    <table class="table table-bordered">
                        <tr>
                            <th>Chỉ số cũ</th>
                            <td th:text="${meter.oldWater}"></td>
                        </tr>

                        <tr>
                            <th>Chỉ số mới</th>
                            <td th:text="${meter.newWater}"></td>
                        </tr>

                        <tr>
                            <th>Số nước đã dùng</th>
                            <td th:text="${meter.waterUsed}"></td>
                        </tr>

                        <tr>
                            <th>Đơn giá nước</th>
                            <td>
                                <span th:text="${#numbers.formatDecimal(meter.waterUnitPrice, 0, 'COMMA', 0, 'POINT')}"></span> VNĐ
                            </td>
                        </tr>

                        <tr class="table-info">
                            <th>Thành tiền nước</th>
                            <td>
                                <strong>
                                    <span th:text="${#numbers.formatDecimal(meter.waterAmount, 0, 'COMMA', 0, 'POINT')}"></span> VNĐ
                                </strong>
                            </td>
                        </tr>
                    </table>
                </div>
            </div>

            <hr>

            <p>
                <strong>Ghi chú:</strong>
                <span th:text="${meter.note != null ? meter.note : 'Không có ghi chú'}"></span>
            </p>

        </div>
    </div>

</div>
</body>
</html>
