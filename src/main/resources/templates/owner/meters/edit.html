<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Sửa chỉ số điện nước</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>
<div class="container mt-4">

    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2>Sửa chỉ số điện nước</h2>
        <a th:href="@{/owner/meters}" class="btn btn-secondary">Quay lại</a>
    </div>

    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

    <div class="card shadow-sm mb-3">
        <div class="card-body">
            <p>
                <strong>Phòng:</strong>
                <span th:text="${meter.room != null ? meter.room.roomNumber : 'Không có'}"></span>
            </p>

            <p>
                <strong>Tháng/Năm:</strong>
                <span th:text="${meter.month}"></span>/<span th:text="${meter.year}"></span>
            </p>
        </div>
    </div>

    <form th:action="@{/owner/meters/{id}/edit(id=${meter.id})}" method="post" class="card shadow-sm">
        <div class="card-body">

            <h5>Chỉ số điện</h5>

            <div class="row">
                <div class="col-md-4 mb-3">
                    <label class="form-label">Chỉ số điện cũ</label>
                    <input type="number"
                           name="oldElectricity"
                           class="form-control"
                           min="0"
                           step="0.1"
                           th:value="${meter.oldElectricity}"
                           required>
                </div>

                <div class="col-md-4 mb-3">
                    <label class="form-label">Chỉ số điện mới</label>
                    <input type="number"
                           name="newElectricity"
                           class="form-control"
                           min="0"
                           step="0.1"
                           th:value="${meter.newElectricity}"
                           required>
                </div>

                <div class="col-md-4 mb-3">
                    <label class="form-label">Đơn giá điện</label>
                    <input type="number"
                           name="electricityUnitPrice"
                           class="form-control"
                           min="0"
                           step="100"
                           th:value="${meter.electricityUnitPrice}"
                           required>
                </div>
            </div>

            <h5>Chỉ số nước</h5>

            <div class="row">
                <div class="col-md-4 mb-3">
                    <label class="form-label">Chỉ số nước cũ</label>
                    <input type="number"
                           name="oldWater"
                           class="form-control"
                           min="0"
                           step="0.1"
                           th:value="${meter.oldWater}"
                           required>
                </div>

                <div class="col-md-4 mb-3">
                    <label class="form-label">Chỉ số nước mới</label>
                    <input type="number"
                           name="newWater"
                           class="form-control"
                           min="0"
                           step="0.1"
                           th:value="${meter.newWater}"
                           required>
                </div>

                <div class="col-md-4 mb-3">
                    <label class="form-label">Đơn giá nước</label>
                    <input type="number"
                           name="waterUnitPrice"
                           class="form-control"
                           min="0"
                           step="100"
                           th:value="${meter.waterUnitPrice}"
                           required>
                </div>
            </div>

            <div class="mb-3">
                <label class="form-label">Ghi chú</label>
                <textarea name="note"
                          class="form-control"
                          rows="3"
                          th:text="${meter.note}"></textarea>
            </div>

            <div class="alert alert-info">
                Sau khi lưu, hệ thống sẽ tự tính lại số điện, số nước, tiền điện và tiền nước.
            </div>

            <button type="submit" class="btn btn-primary">Cập nhật chỉ số</button>
            <a th:href="@{/owner/meters}" class="btn btn-secondary">Hủy</a>

        </div>
    </form>

</div>
</body>
</html>
