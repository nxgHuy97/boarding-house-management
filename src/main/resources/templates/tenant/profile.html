<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Thông tin cá nhân</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>
<div class="container mt-4">

    <a th:href="@{/tenant/dashboard}" class="btn btn-secondary mb-3">Quay lại</a>

    <div class="card shadow-sm">
        <div class="card-header">
            <h3>Thông tin cá nhân</h3>
        </div>

        <div class="card-body">
            <p>
                <strong>Họ tên:</strong>
                <span th:text="${user.fullName != null ? user.fullName : 'Chưa cập nhật'}"></span>
            </p>

            <p>
                <strong>Tên đăng nhập:</strong>
                <span th:text="${user.username}"></span>
            </p>

            <p>
                <strong>Email:</strong>
                <span th:text="${user.email != null ? user.email : 'Chưa cập nhật'}"></span>
            </p>

            <p>
                <strong>Số điện thoại:</strong>
                <span th:text="${user.phone != null ? user.phone : 'Chưa cập nhật'}"></span>
            </p>

            <p>
                <strong>Trạng thái tài khoản:</strong>
                <span class="badge bg-success" th:text="${user.status}"></span>
            </p>

            <p>
                <strong>Mã dãy trọ:</strong>
                <span th:text="${user.motelCode != null ? user.motelCode : 'Chưa có'}"></span>
            </p>

            <p>
                <strong>Vai trò:</strong>
                <span th:text="${user.role != null ? user.role.name : 'Không có'}"></span>
            </p>
        </div>
    </div>

</div>
</body>
</html>
