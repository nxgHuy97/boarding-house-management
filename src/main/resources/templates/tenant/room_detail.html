<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Chi tiết phòng</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>
<div class="container mt-4">

    <a th:href="@{/tenant/rooms}" class="btn btn-secondary mb-3">
        Quay lại danh sách phòng
    </a>

    <div class="card shadow-sm">
        <div class="card-header">
            <h3>Phòng <span th:text="${room.roomNumber}"></span></h3>
        </div>

        <div class="card-body">
            <p>
                <strong>Mã phòng:</strong>
                <span th:text="${room.roomCode != null ? room.roomCode : 'Chưa có'}"></span>
            </p>

            <p>
                <strong>Giá thuê:</strong>
                <span th:text="${#numbers.formatDecimal(room.price, 0, 'COMMA', 0, 'POINT')}"></span>
                VNĐ/tháng
            </p>

            <p>
                <strong>Diện tích:</strong>
                <span th:text="${room.area}"></span> m²
            </p>

            <p>
                <strong>Trạng thái:</strong>
                <span class="badge bg-success" th:text="${room.status}"></span>
            </p>

            <p>
                <strong>Loại phòng:</strong>
                <span th:text="${room.category != null ? room.category.name : 'Chưa phân loại'}"></span>
            </p>

            <hr>

            <div th:if="${room.category != null}">
                <h5>Tiện ích / quy định</h5>

                <ul>
                    <li th:if="${room.category.hasMezzanine}">Có gác lửng</li>
                    <li th:if="${room.category.allowPets}">Cho nuôi thú cưng</li>
                    <li th:if="${room.category.hasAirConditioner}">Có máy lạnh</li>
                    <li th:if="${room.category.hasBalcony}">Có ban công</li>
                </ul>

                <div th:if="${room.category.utilities != null and !room.category.utilities.isEmpty()}">
                    <h6>Tiện ích khác:</h6>

                    <span th:each="utility : ${room.category.utilities}"
                          class="badge bg-info text-dark me-1">
                        <span th:text="${utility.name}"></span>
                    </span>
                </div>
            </div>

            <hr>

            <h5>Mô tả</h5>
            <p th:text="${room.description != null ? room.description : 'Chưa có mô tả'}"></p>

            <button class="btn btn-success" disabled>
                Liên hệ chủ trọ để thuê
            </button>
        </div>
    </div>

</div>
</body>
</html>
