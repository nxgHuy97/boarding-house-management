<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Hợp đồng của tôi</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>
<div class="container mt-4">

    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2>Hợp đồng của tôi</h2>
        <a th:href="@{/tenant/dashboard}" class="btn btn-secondary">Quay lại</a>
    </div>

    <table class="table table-bordered table-hover" th:if="${contracts != null and !contracts.isEmpty()}">
        <thead class="table-dark">
        <tr>
            <th>Mã hợp đồng</th>
            <th>Phòng</th>
            <th>Chủ trọ</th>
            <th>Ngày bắt đầu</th>
            <th>Ngày kết thúc</th>
            <th>Giá thuê</th>
            <th>Tiền cọc</th>
            <th>Trạng thái</th>
        </tr>
        </thead>

        <tbody>
        <tr th:each="contract : ${contracts}">
            <td th:text="${contract.contractNumber}"></td>

            <td th:text="${contract.room != null ? contract.room.roomNumber : 'Không có'}"></td>

            <td th:text="${contract.owner != null ? contract.owner.fullName : 'Không có'}"></td>

            <td th:text="${contract.startDate}"></td>

            <td th:text="${contract.endDate}"></td>

            <td>
                <span th:text="${#numbers.formatDecimal(contract.price, 0, 'COMMA', 0, 'POINT')}"></span>
                VNĐ
            </td>

            <td>
                <span th:text="${#numbers.formatDecimal(contract.deposit, 0, 'COMMA', 0, 'POINT')}"></span>
                VNĐ
            </td>

            <td>
                <span class="badge"
                      th:classappend="${contract.status == 'ACTIVE'} ? ' bg-success' : ' bg-secondary'"
                      th:text="${contract.status}">
                </span>
            </td>
        </tr>
        </tbody>
    </table>

    <div th:if="${contracts == null or contracts.isEmpty()}" class="alert alert-warning">
        Bạn chưa có hợp đồng nào.
    </div>

</div>
</body>
</html>
