<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Thanh toán của tôi</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>
<div class="container mt-4">

    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2>Thanh toán của tôi</h2>
        <div>
            <a th:href="@{/tenant/invoices}" class="btn btn-primary">Xem hóa đơn</a>
            <a th:href="@{/tenant/dashboard}" class="btn btn-secondary">Dashboard</a>
        </div>
    </div>

    <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

    <table class="table table-bordered table-hover" th:if="${payments != null and !payments.isEmpty()}">
        <thead class="table-dark">
        <tr>
            <th>Mã thanh toán</th>
            <th>Mã hóa đơn</th>
            <th>Phòng</th>
            <th>Số tiền</th>
            <th>Phương thức</th>
            <th>Mã giao dịch</th>
            <th>Ngày gửi</th>
            <th>Trạng thái</th>
            <th>Ghi chú</th>
        </tr>
        </thead>

        <tbody>
        <tr th:each="payment : ${payments}">
            <td th:text="${payment.paymentCode}"></td>

            <td>
                <a th:href="@{/tenant/invoices/{id}(id=${payment.invoice.id})}"
                   th:text="${payment.invoice.invoiceCode}">
                </a>
            </td>

            <td th:text="${payment.invoice.room != null ? payment.invoice.room.roomNumber : 'Không có'}"></td>

            <td>
                <span th:text="${#numbers.formatDecimal(payment.amount, 0, 'COMMA', 0, 'POINT')}"></span>
                VNĐ
            </td>

            <td th:text="${payment.method}"></td>

            <td th:text="${payment.transactionCode != null ? payment.transactionCode : 'Không có'}"></td>

            <td th:text="${payment.paidAt}"></td>

            <td>
                <span class="badge"
                      th:classappend="${payment.status == 'APPROVED'} ? ' bg-success' :
                                      (${payment.status == 'REJECTED'} ? ' bg-danger' : ' bg-warning text-dark')"
                      th:text="${payment.status}">
                </span>
            </td>

            <td th:text="${payment.note != null ? payment.note : ''}"></td>
        </tr>
        </tbody>
    </table>

    <div th:if="${payments == null or payments.isEmpty()}" class="alert alert-warning">
        Bạn chưa có thanh toán nào.
    </div>

</div>
</body>
</html>
