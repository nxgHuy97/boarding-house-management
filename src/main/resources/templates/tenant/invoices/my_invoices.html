<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Hóa đơn của tôi</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>
<div class="container mt-4">

    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2>Hóa đơn của tôi</h2>
        <a th:href="@{/tenant/dashboard}" class="btn btn-secondary">Quay lại Dashboard</a>
    </div>

    <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

    <table class="table table-bordered table-hover" th:if="${invoices != null and !invoices.isEmpty()}">
        <thead class="table-dark">
        <tr>
            <th>Mã hóa đơn</th>
            <th>Phòng</th>
            <th>Tháng/Năm</th>
            <th>Tổng tiền</th>
            <th>Đã trả</th>
            <th>Còn lại</th>
            <th>Hạn thanh toán</th>
            <th>Trạng thái</th>
            <th>Thao tác</th>
        </tr>
        </thead>

        <tbody>
        <tr th:each="invoice : ${invoices}">
            <td th:text="${invoice.invoiceCode}"></td>

            <td th:text="${invoice.room != null ? invoice.room.roomNumber : 'Không có'}"></td>

            <td>
                <span th:text="${invoice.invoiceMonth}"></span>/<span th:text="${invoice.invoiceYear}"></span>
            </td>

            <td>
                <span th:text="${#numbers.formatDecimal(invoice.totalAmount, 0, 'COMMA', 0, 'POINT')}"></span>
                VNĐ
            </td>

            <td>
                <span th:text="${#numbers.formatDecimal(invoice.paidAmount, 0, 'COMMA', 0, 'POINT')}"></span>
                VNĐ
            </td>

            <td>
                <span th:text="${#numbers.formatDecimal(invoice.remainingAmount, 0, 'COMMA', 0, 'POINT')}"></span>
                VNĐ
            </td>

            <td th:text="${invoice.dueDate}"></td>

            <td>
                <span class="badge"
                      th:classappend="${invoice.status == 'PAID'} ? ' bg-success' :
                                      (${invoice.status == 'PARTIAL'} ? ' bg-warning text-dark' :
                                      (${invoice.status == 'OVERDUE'} ? ' bg-danger' : ' bg-secondary'))"
                      th:text="${invoice.status}">
                </span>
            </td>

            <td>
                <a th:href="@{/tenant/invoices/{id}(id=${invoice.id})}" class="btn btn-sm btn-info">
                    Chi tiết
                </a>

                <a th:if="${invoice.status != 'PAID'}"
                   th:href="@{/tenant/payments/create(invoiceId=${invoice.id})}"
                   class="btn btn-sm btn-success">
                    Thanh toán
                </a>
            </td>
        </tr>
        </tbody>
    </table>

    <div th:if="${invoices == null or invoices.isEmpty()}" class="alert alert-warning">
        Bạn chưa có hóa đơn nào.
    </div>

</div>
</body>
</html>
