<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Danh sách phòng trống</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>
<div class="container mt-4">

    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2>Danh sách phòng còn trống</h2>
        <a th:href="@{/tenant/dashboard}" class="btn btn-secondary">Quay lại</a>
    </div>

    <div class="row" th:if="${rooms != null and !rooms.isEmpty()}">
        <div class="col-md-4 mb-3" th:each="room : ${rooms}">
            <div class="card shadow-sm h-100">
                <div class="card-body">
                    <h5 class="card-title">
                        Phòng <span th:text="${room.roomNumber}"></span>
                    </h5>

                    <p>
                        <strong>Giá:</strong>
                        <span th:text="${#numbers.formatDecimal(room.price, 0, 'COMMA', 0, 'POINT')}"></span>
                        VNĐ/tháng
                    </p>

                    <p>
                        <strong>Diện tích:</strong>
                        <span th:text="${room.area}"></span> m²
                    </p>

                    <p>
                        <strong>Loại phòng:</strong>
                        <span th:text="${room.category != null ? room.category.name : 'Chưa phân loại'}"></span>
                    </p>

                    <p>
                        <strong>Trạng thái:</strong>
                        <span class="badge bg-success" th:text="${room.status}"></span>
                    </p>

                    <a th:href="@{/tenant/rooms/{id}(id=${room.id})}" class="btn btn-primary">
                        Xem chi tiết
                    </a>
                </div>
            </div>
        </div>
    </div>

    <div th:if="${rooms == null or rooms.isEmpty()}" class="alert alert-warning">
        Hiện chưa có phòng trống.
    </div>

</div>
</body>
</html>
