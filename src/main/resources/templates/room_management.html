<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Quản lý phòng trọ</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-5">
<div class="d-flex justify-content-between align-items-center mb-4">
    <h2>Danh sách phòng trọ</h2>
    <button class="btn btn-primary">Thêm phòng mới</button>
</div>

<table class="table table-hover shadow-sm">
    <thead class="table-dark">
    <tr>
        <th>Số phòng</th>
        <th>Diện tích (m²)</th>
        <th>Giá thuê (VNĐ)</th>
        <th>Trạng thái</th>
        <th>Thao tác</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="room : ${rooms}">
        <td th:text="${room.roomNumber}" class="fw-bold"></td>
        <td th:text="${room.area}"></td>
        <td th:text="${#numbers.formatDecimal(room.price, 0, 'COMMA', 0, 'POINT')}"></td>
        <td>
                    <span th:class="${room.status == 'TRỐNG' ? 'badge bg-success' : 'badge bg-danger'}"
                          th:text="${room.status}"></span>
        </td>
        <td>
            <a href="#" class="btn btn-sm btn-outline-info">Sửa</a>
            <a href="#" class="btn btn-sm btn-outline-danger">Xóa</a>
        </td>
    </tr>
    </tbody>
</table>
</body>
</html>
