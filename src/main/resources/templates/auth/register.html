<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Đăng ký hệ thống</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        body {
            background-color: #f8f9fa;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .register-card {
            width: 100%;
            max-width: 500px;
            background: #ffffff;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
    </style>
</head>
<body>

<div class="register-card">
    <h3 class="text-center fw-bold mb-4">Đăng ký hệ thống</h3>

    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>
    <div th:if="${message}" class="alert alert-success" th:text="${message}"></div>

    <form th:action="@{/auth/register}" th:object="${registerRequest}" method="POST">

        <div class="mb-3">
            <label class="form-label">Họ và tên</label>
            <input type="text" class="form-control" th:field="*{fullName}" required placeholder="Nhập họ và tên">
        </div>

        <div class="mb-3">
            <label class="form-label">Tên đăng nhập (SĐT)</label>
            <input type="text" class="form-control" th:field="*{username}" required placeholder="Nhập số điện thoại">
        </div>

        <div class="mb-3">
            <label class="form-label">Email</label>
            <input type="email" class="form-control" th:field="*{email}" required placeholder="Nhập email của bạn">
        </div>

        <div class="mb-3">
            <label class="form-label">Mật khẩu</label>
            <input type="password" class="form-control" th:field="*{password}" required placeholder="Mật khẩu">
        </div>

        <div class="mb-3">
            <label class="form-label">Vai trò</label>
            <select class="form-select" th:field="*{roleId}" id="roleSelect" onchange="toggleFields()" required>
                <option value="" disabled selected>Chọn vai trò của bạn</option>
                <option value="3">Chủ trọ (Owner)</option>
                <option value="2">Người thuê (Tenant)</option>
            </select>
        </div>

        <div class="mb-3" id="roomCodeField" style="display: none;">
            <label class="form-label">Mã phòng / Mã dãy trọ</label>
            <input type="text" class="form-control" name="roomCode" placeholder="Nhập mã phòng đã được cấp">
            <div class="form-text text-muted">Bắt buộc để xác thực phòng trọ bạn muốn thuê.</div>
        </div>

        <div id="ownerFields" style="display: none;">
            <div class="mb-3">
                <label class="form-label">Tên nhà trọ / Dãy trọ</label>
                <input type="text" class="form-control" name="houseName" placeholder="Ví dụ: Khu trọ A, Chung cư mini B">
            </div>
            <div class="mb-3">
                <label class="form-label">Địa chỉ trọ</label>
                <textarea class="form-control" name="houseAddress" rows="2" placeholder="Số nhà, đường, phường/xã, quận/huyện..."></textarea>
            </div>
        </div>

        <button type="submit" class="btn btn-success w-100 mt-3">Gửi yêu cầu phê duyệt</button>

        <div class="text-center mt-3">
            <a th:href="@{/auth/login}" class="text-decoration-none">Đã có tài khoản? Đăng nhập</a>
        </div>
    </form>
</div>

<script>
    function toggleFields() {
        var roleSelect = document.getElementById("roleSelect");
        var roomCodeField = document.getElementById("roomCodeField");
        var ownerFields = document.getElementById("ownerFields");

        // value "2" tương ứng với Role Tenant
        if (roleSelect.value === "2") {
            roomCodeField.style.display = "block";
            ownerFields.style.display = "none";
        }
        // value "3" tương ứng với Role Owner
        else if (roleSelect.value === "3") {
            roomCodeField.style.display = "none";
            ownerFields.style.display = "block";
        } else {
            roomCodeField.style.display = "none";
            ownerFields.style.display = "none";
        }
    }
</script>
</body>
</html>
