<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Đăng nhập - Hệ thống quản lý</title>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background-color: #f4f7f6; }
        .login-container { border: none; padding: 35px; border-radius: 15px; width: 400px; background: white; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #2c3e50; font-weight: bold; margin-bottom: 25px; }
        .error-msg { color: #dc3545; background-color: #f8d7da; padding: 12px; border-radius: 8px; margin-bottom: 15px; text-align: center; font-size: 14px; border: 1px solid #f5c6cb; }
        .alert-custom { padding: 12px; border-radius: 8px; margin-bottom: 15px; text-align: center; font-size: 14px; }
        input.form-control { padding: 12px; margin-bottom: 15px; border-radius: 8px; }
        .btn-login { width: 100%; padding: 12px; background-color: #28a745; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 16px; font-weight: bold; transition: all 0.3s; }
        .btn-login:hover { background-color: #218838; transform: translateY(-1px); }
        .links-container { display: flex; justify-content: space-between; margin-top: 20px; font-size: 14px; }
        a { color: #007bff; text-decoration: none; transition: color 0.2s; }
        a:hover { color: #0056b3; text-decoration: underline; }
        .forgot-link { color: #dc3545; cursor: pointer; }
    </style>
</head>
<body>
<div class="login-container">
    <h2>Đăng Nhập</h2>

    <div th:if="${param.error}" class="error-msg">
        Tên đăng nhập hoặc mật khẩu không chính xác!
    </div>

    <div th:if="${param.logout}" class="alert alert-success alert-custom">
        Bạn đã đăng xuất thành công.
    </div>

    <div th:if="${message}" class="alert alert-info alert-custom" th:text="${message}"></div>

    <form th:action="@{/auth/login}" method="post">
        <input type="text" name="username" class="form-control" placeholder="Tên đăng nhập" required autofocus>
        <input type="password" name="password" class="form-control" placeholder="Mật khẩu" required>

        <button type="submit" class="btn-login">Đăng nhập</button>
    </form>

    <div class="links-container">
        <a th:href="@{/auth/register}">Đăng ký ngay</a>
        <span class="forgot-link fw-bold" data-bs-toggle="modal" data-bs-target="#forgotModal">Quên mật khẩu?</span>
    </div>
</div>

<div class="modal fade" id="forgotModal" tabindex="-1" aria-labelledby="forgotModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content" style="border-radius: 15px;">
            <form th:action="@{/auth/forgot-password}" method="post">
                <div class="modal-header border-0">
                    <h5 class="modal-title fw-bold" id="forgotModalLabel">Yêu cầu cấp lại mật khẩu</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <p class="text-muted small mb-3">
                        Vui lòng nhập tên đăng nhập. Hệ thống sẽ gửi yêu cầu reset mật khẩu tới:
                        <br>- <strong>Quản trị viên</strong> (Nếu bạn là Chủ nhà)
                        <br>- <strong>Chủ nhà</strong> (Nếu bạn là Khách thuê)
                    </p>
                    <input type="text" name="username" class="form-control" placeholder="Nhập tên đăng nhập của bạn" required>
                </div>
                <div class="modal-footer border-0">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Hủy</button>
                    <button type="submit" class="btn btn-danger px-4">Gửi yêu cầu</button>
                </div>
            </form>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
