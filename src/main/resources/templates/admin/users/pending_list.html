<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Phê duyệt tài khoản - Admin Panel</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
  <style>
    body { background-color: #f8f9fa; }
    .card { border-radius: 12px; border: none; }
    .table thead { background-color: #343a40; color: white; }
    .btn-back { margin-bottom: 20px; }
    .badge-role { font-size: 0.85rem; padding: 5px 10px; }
  </style>
</head>
<body>

<div class="container py-5">
  <div class="btn-back">
    <a th:href="@{/admin/dashboard}" class="btn btn-outline-secondary shadow-sm">
      <i class="bi bi-arrow-left"></i> Quay lại Dashboard
    </a>
  </div>

  <div class="card shadow">
    <div class="card-header bg-white py-3 d-flex justify-content-between align-items-center">
      <h4 class="mb-0 text-primary fw-bold">
        <i class="bi bi-person-check-fill"></i> Danh sách yêu cầu phê duyệt
      </h4>
      <span class="badge bg-warning text-dark" th:text="${users.size() + ' yêu cầu đang chờ'}">0 yêu cầu</span>
    </div>

    <div class="card-body p-0">
      <div th:if="${message}" class="alert alert-success m-3 alert-dismissible fade show" role="alert">
        <span th:text="${message}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
      </div>

      <div class="table-responsive">
        <table class="table table-hover mb-0 align-middle">
          <thead>
          <tr>
            <th class="px-4">Người dùng</th>
            <th>Họ và tên</th>
            <th>Vai trò đăng ký</th>
            <th>Ngày đăng ký</th>
            <th class="text-center">Hành động</th>
          </tr>
          </thead>
          <tbody>
          <tr th:each="user : ${users}">
            <td class="px-4 fw-bold" th:text="${user.username}">username</td>
            <td th:text="${user.fullName}">Full Name</td>
            <td>
              <span th:class="'badge-role badge ' + ${user.role.name == 'ADMIN' ? 'bg-danger' : (user.role.name == 'OWNER' ? 'bg-success' : 'bg-primary')}"
                    th:text="${user.role.name}">Role</span>
            </td>
            <td th:text="${#temporals.format(user.createdAt, 'dd/MM/yyyy HH:mm')}">Date</td>
            <td class="text-center">
              <div class="d-flex justify-content-center gap-2">
                <form th:action="@{/admin/users/approve/{id}(id=${user.id})}" method="post">
                  <button type="submit" class="btn btn-success btn-sm px-3 shadow-sm">
                    <i class="bi bi-check-lg"></i> Phê duyệt
                  </button>
                </form>

                <form th:action="@{/admin/users/reject/{id}(id=${user.id})}" method="post"
                      onsubmit="return confirm('Bạn có chắc chắn muốn TỪ CHỐI và XÓA tài khoản này không?')">
                  <button type="submit" class="btn btn-danger btn-sm px-3 shadow-sm">
                    <i class="bi bi-x-lg"></i> Từ chối
                  </button>
                </form>
              </div>
            </td>
          </tr>

          <tr th:if="${#lists.isEmpty(users)}">
            <td colspan="5" class="text-center py-5 text-muted">
              <i class="bi bi-inbox fs-1 d-block mb-2 text-secondary"></i>
              Hiện tại không có yêu cầu nào cần phê duyệt.
            </td>
          </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
