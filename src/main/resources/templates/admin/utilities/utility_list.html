<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý Tiện ích - Admin Panel</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        body { background-color: #f4f7f6; }
        .card { border: none; border-radius: 12px; }
        .table thead { background-color: #212529; color: white; }
        .icon-preview {
            width: 50px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #e9ecef;
            border-radius: 10px;
        }
    </style>
</head>
<body>

<div class="container py-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="fw-bold text-dark"><i class="bi bi-stars text-warning"></i> Quản lý Tiện ích</h2>
        <a th:href="@{/admin/dashboard}" class="btn btn-outline-secondary shadow-sm">
            <i class="bi bi-arrow-left"></i> Quay lại Dashboard
        </a>
    </div>

    <div class="row">
        <div class="col-md-4 mb-4">
            <div class="card shadow-sm p-4">
                <h5 class="fw-bold mb-3 border-bottom pb-2">Thêm tiện ích mới</h5>

                <div th:if="${error}" class="alert alert-danger py-2" th:text="${error}"></div>

                <form th:action="@{/admin/utilities/save}" th:object="${newUtility}" method="post">
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Tên tiện ích</label>
                        <input type="text" th:field="*{name}" class="form-control shadow-sm"
                               placeholder="VD: Wifi miễn phí, Điều hòa..." required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Icon Class (Bootstrap Icons)</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-info-circle"></i></span>
                            <input type="text" th:field="*{icon}" class="form-control shadow-sm"
                                   id="iconInput" placeholder="VD: bi-wifi">
                        </div>
                        <div class="form-text mt-2">
                            Xem danh sách mã icon tại:
                            <a href="https://icons.getbootstrap.com/" target="_blank" class="text-decoration-none">icons.getbootstrap.com</a>
                        </div>
                    </div>

                    <div class="d-flex align-items-center bg-light p-2 rounded mb-3">
                        <div class="icon-preview me-3">
                            <i id="iconPreview" class="bi bi-gear fs-3 text-primary"></i>
                        </div>
                        <small class="text-muted">Xem trước biểu tượng hiển thị</small>
                    </div>

                    <button type="submit" class="btn btn-primary w-100 shadow-sm">
                        <i class="bi bi-plus-circle"></i> Lưu tiện ích
                    </button>
                </form>
            </div>
        </div>

        <div class="col-md-8">
            <div th:if="${message}" class="alert alert-success shadow-sm mb-3" th:text="${message}"></div>

            <div class="card shadow-sm overflow-hidden">
                <div class="card-body p-0">
                    <table class="table table-hover align-middle mb-0">
                        <thead class="table-dark">
                        <tr>
                            <th class="ps-4" style="width: 100px;">Biểu tượng</th>
                            <th>Tên tiện ích</th>
                            <th class="text-center">Thao tác</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="u : ${utilities}">
                            <td class="ps-4">
                                <div class="icon-preview">
                                    <i th:class="${u.icon != null ? 'bi ' + u.icon : 'bi bi-gear'}" class="fs-3 text-primary"></i>
                                </div>
                            </td>
                            <td>
                                <span class="fw-bold text-dark" th:text="${u.name}">Tên tiện ích</span>
                            </td>
                            <td class="text-center">
                                <a th:href="@{/admin/utilities/delete/{id}(id=${u.id})}"
                                   class="btn btn-outline-danger btn-sm px-3"
                                   onclick="return confirm('Bạn có chắc chắn muốn xóa tiện ích này?')">
                                    <i class="bi bi-trash"></i> Xóa
                                </a>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(utilities)}">
                            <td colspan="3" class="text-center py-5 text-muted">
                                <i class="bi bi-inbox fs-1 d-block mb-2"></i>
                                Chưa có tiện ích nào được tạo.
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    const iconInput = document.getElementById('iconInput');
    const iconPreview = document.getElementById('iconPreview');

    iconInput.addEventListener('input', function() {
        const iconClass = this.value.trim() || 'bi-gear';
        // Xóa các class cũ và thêm class mới (Bootstrap Icons cần class 'bi')
        iconPreview.className = 'bi ' + iconClass + ' fs-3 text-primary';
    });
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
