<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Giám sát hệ thống phòng</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">
<div class="container mt-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2><i class="bi bi-eye"></i> Danh sách phòng toàn hệ thống</h2>
        <a th:href="@{/admin/dashboard}" class="btn btn-secondary">Quay lại Dashboard</a>
    </div>

    <div class="card shadow-sm">
        <div class="card-body">
            <table class="table table-hover">
                <thead class="table-dark">
                <tr>
                    <th>Số phòng</th>
                    <th>Loại phòng</th>
                    <th>Giá thuê</th>
                    <th>Diện tích</th>
                    <th>Trạng thái</th>
                    <th>Chủ sở hữu (Owner)</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="room : ${rooms}">
                    <td th:text="${room.roomNumber}"></td>
                    <td th:text="${room.category != null ? room.category.name : 'Chưa phân loại'}"></td>
                    <td th:text="${room.price != null ? #numbers.formatDecimal(room.price, 0, 'COMMA', 0, 'POINT') + ' VNĐ' : 'Chưa có giá'}"></td>
                    <td th:text="${room.area != null ? room.area + ' m2' : 'Chưa nhập'}"></td>
                    <td>
                        <span th:if="${room.status == 'AVAILABLE'}" class="badge bg-success">Trống</span>
                        <span th:if="${room.status == 'OCCUPIED'}" class="badge bg-danger">Đã thuê</span>
                        <span th:if="${room.status == 'MAINTENANCE'}" class="badge bg-warning">Bảo trì</span>
                        <span th:if="${room.status == null}" class="badge bg-secondary">Chưa rõ</span>
                    </td>
                    <td th:text="${room.owner != null ? room.owner.username : 'Chưa gán'}"></td>
                </tr>
                <tr th:if="${#lists.isEmpty(rooms)}">
                    <td colspan="6" class="text-center text-muted">Chưa có phòng nào được tạo trên hệ thống.</td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
</body>
</html>
