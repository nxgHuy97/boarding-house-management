<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Quản lý loại phòng</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
</head>
<body class="bg-light">
<div class="container mt-5">
    <div class="mb-4">
        <a th:href="@{/admin/dashboard}" class="btn btn-outline-secondary">
            <i class="bi bi-arrow-left"></i> Quay lại Dashboard
        </a>
    </div>

    <div th:if="${message}" class="alert alert-success" th:text="${message}"></div>
    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

    <div class="row">
        <div class="col-md-4">
            <div class="card shadow-sm">
                <div class="card-header bg-white">
                    <h5 class="text-primary fw-bold mb-0">Thêm loại phòng mới</h5>
                </div>
                <div class="card-body">
                    <form th:action="@{/admin/categories/save}" th:object="${newCategory}" method="post">

                        <div class="mb-3">
                            <label class="form-label fw-bold">Tên loại phòng <span class="text-danger">*</span></label>
                            <input type="text" th:field="*{name}" class="form-control" placeholder="VD: Căn hộ mini" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-bold">Mô tả</label>
                            <textarea th:field="*{description}" class="form-control" rows="2" placeholder="Thông tin chi tiết..."></textarea>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-bold text-primary border-bottom w-100 pb-1">Tiện ích nội thất</label>
                            <div class="row px-2">
                                <div th:each="util : ${allUtilities}" class="col-6 form-check mb-2">
                                    <input class="form-check-input" type="checkbox"
                                           th:value="${util.id}"
                                           th:field="*{utilities}"
                                           th:id="'util-' + ${util.id}">
                                    <label class="form-check-label" th:for="'util-' + ${util.id}" th:text="${util.name}"></label>
                                </div>
                                <div th:if="${#lists.isEmpty(allUtilities)}" class="text-muted small fst-italic">
                                    Chưa có tiện ích nào. Hãy thêm ở mục Quản lý tiện ích.
                                </div>
                            </div>
                        </div>

                        <div class="mb-4">
                            <label class="form-label fw-bold text-primary border-bottom w-100 pb-1">Quy định phòng</label>
                            <div class="form-check mb-2">
                                <input class="form-check-input" type="checkbox" th:field="*{hasMezzanine}" id="mezzanine">
                                <label class="form-check-label" for="mezzanine">Có gác lửng</label>
                            </div>
                            <div class="form-check mb-2">
                                <input class="form-check-input" type="checkbox" th:field="*{allowPets}" id="pets">
                                <label class="form-check-label" for="pets">Cho phép nuôi thú cưng</label>
                            </div>
                            <div class="form-check mb-2">
                                <input class="form-check-input" type="checkbox" th:field="*{hasAirConditioner}" id="aircon">
                                <label class="form-check-label" for="aircon">Có máy lạnh</label>
                            </div>
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" th:field="*{hasBalcony}" id="balcony">
                                <label class="form-check-label" for="balcony">Có ban công</label>
                            </div>
                        </div>

                        <button type="submit" class="btn btn-primary w-100">
                            <i class="bi bi-save me-2"></i>Lưu dữ liệu
                        </button>
                    </form>
                </div>
            </div>
        </div>

        <div class="col-md-8">
            <div class="card shadow-sm">
                <div class="card-header bg-dark text-white">
                    <h5 class="mb-0">Danh sách loại phòng hiện có</h5>
                </div>
                <div class="card-body p-0">
                    <table class="table table-hover mb-0">
                        <thead class="table-light">
                        <tr>
                            <th>Tên loại</th>
                            <th>Mô tả</th>
                            <th>Tiện ích & Quy định</th>
                            <th>Thao tác</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="cat : ${categories}">
                            <td class="fw-bold text-primary" th:text="${cat.name}"></td>
                            <td th:text="${cat.description}"></td>
                            <td>
                                <span th:if="${cat.hasMezzanine}" class="badge bg-info text-dark">Có gác</span>
                                <span th:if="${cat.allowPets}" class="badge bg-warning text-dark">Nuôi pet</span>
                                <span th:if="${cat.hasAirConditioner}" class="badge bg-primary">Máy lạnh</span>
                                <span th:if="${cat.hasBalcony}" class="badge bg-success">Ban công</span>

                                <span th:each="u : ${cat.utilities}" class="badge bg-secondary me-1" th:text="${u.name}"></span>
                            </td>
                            <td>
                                <a th:href="@{/admin/categories/delete/{id}(id=${cat.id})}" class="btn btn-sm btn-outline-danger" onclick="return confirm('Xóa loại phòng này?')">
                                    Xóa
                                </a>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(categories)}">
                            <td colspan="4" class="text-center text-muted py-4">Chưa có dữ liệu loại phòng.</td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
