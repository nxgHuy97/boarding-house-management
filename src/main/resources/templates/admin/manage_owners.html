<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Quản lý mã dãy trọ - Admin Panel</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
</head>
<body class="bg-light py-4">
<div class="container">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h4>Quản lý mã dãy trọ của các Chủ trọ (Owner)</h4>
        <a th:href="@{/admin/dashboard}" class="btn btn-secondary"><i class="bi bi-arrow-left"></i> Về Dashboard</a>
    </div>

    <div th:if="${message}" class="alert alert-success" th:text="${message}"></div>
    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

    <div class="card border-0 shadow-sm">
        <div class="card-body p-0">
            <table class="table table-hover align-middle mb-0">
                <thead class="table-dark">
                <tr>
                    <th>Họ và tên</th>
                    <th>Tài khoản (SĐT)</th>
                    <th>Trạng thái</th>
                    <th>Thao tác</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="owner : ${owners}">
                    <td th:text="${owner.fullName}"></td>
                    <td th:text="${owner.username}"></td>
                    <td>
                        <span class="badge bg-primary" th:text="${owner.status}"></span>
                    </td>
                    <td>
                        <form th:action="@{/admin/owners/update-code/{id}(id=${owner.id})}" method="POST" class="d-flex gap-2">
                            <input type="text" class="form-control form-control-sm" name="motelCode" placeholder="Nhập mã dãy trọ" required style="max-width: 250px;">
                            <button type="submit" class="btn btn-sm btn-success">Lưu</button>
                        </form>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
</body>
</html>
